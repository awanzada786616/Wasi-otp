<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Funds | Wasi OTP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --secondary: #ffffff;
            --bg-light: #f8f9fa;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .payment-card {
            background: var(--secondary);
            width: 100%;
            max-width: 480px; /* Thora bara card */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 35px;
            border: 1px solid var(--border-color);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-weight: 800;
            font-size: 26px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        /* QR Section Fixed */
        .qr-section {
            background: #fff;
            border: 2px solid #000;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-section img {
            width: 280px; /* Size Bara Kar Diya */
            height: 280px; /* Square Shape */
            object-fit: contain;
            border-radius: 8px;
            /* No grayscale filter here, original colors will show */
        }

        .qr-label {
            font-size: 12px;
            font-weight: 700;
            background: #000;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        .pay-btn {
            width: 100%;
            background: var(--primary);
            color: #fff;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .pay-btn:hover {
            background: #222;
            transform: translateY(-2px);
        }

        .instructions {
            margin-top: 25px;
            background: #fdfdfd;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #000;
        }

        .instruction-item {
            font-size: 13px;
            color: #444;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .support-link {
            color: #000;
            font-weight: 700;
            text-decoration: underline;
        }

        #status-msg {
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .qr-section img {
                width: 220px;
                height: 220px;
            }
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="header">
        <h1>WASI OTP</h1>
        <p>Deposit via QR Code / Account</p>
    </div>

    <div class="qr-section">
        <img src="qr.png" alt="Payment QR Code">
        <div class="qr-label">Scan to Pay</div>
    </div>

    <div class="input-group">
        <label>Enter Amount</label>
        <input type="number" id="amount" placeholder="Minimum 100" min="100">
    </div>

    <div class="input-group">
        <label>Transaction ID / Hash</label>
        <input type="text" id="trx_id" placeholder="Enter TRX ID after payment">
    </div>

    <button class="pay-btn" onclick="submitPayment()">Submit Payment Request</button>
    
    <div id="status-msg"></div>

    <div class="instructions">
        <div class="instruction-item"><b>1.</b> Minimum payment is 100.</div>
        <div class="instruction-item"><b>2.</b> Scan the QR code and send money.</div>
        <div class="instruction-item"><b>3.</b> Without scanning payment sending is possible through account number.</div>
        <div class="instruction-item"><b>4.</b> After payment, WhatsApp us: <a href="https://wa.me/994401879953" class="support-link">+994401879953</a></div>
        <div class="instruction-item"><b>5.</b> We will verify and add funds instantly.</div>
    </div>
</div>

<script>
    // Supabase Configuration
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function submitPayment() {
        const amount = document.getElementById('amount').value;
        const trx_id = document.getElementById('trx_id').value;
        const msg = document.getElementById('status-msg');

        if(amount < 100) {
            msg.innerText = "❌ Minimum amount is 100";
            msg.style.color = "red";
            return;
        }
        if(!trx_id) {
            msg.innerText = "❌ Please enter Transaction ID";
            msg.style.color = "red";
            return;
        }

        try {
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) {
                msg.innerText = "❌ Please login first!";
                return;
            }

            const { error } = await _supabase.from('payment_requests').insert([
                { user_id: user.id, amount: amount, transaction_id: trx_id, status: 'pending' }
            ]);

            if (error) throw error;

            msg.style.color = "green";
            msg.innerText = "✅ Request submitted! Contact support now.";
            document.getElementById('amount').value = '';
            document.getElementById('trx_id').value = '';

        } catch (err) {
            msg.style.color = "red";
            msg.innerText = "❌ Error: " + err.message;
        }
    }
</script>

</body>
</html>
