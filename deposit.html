<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Funds | Wasi OTP</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --secondary: #ffffff;
            --gray-bg: #f5f5f7;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--gray-bg);
            color: var(--primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .payment-card {
            background: var(--secondary);
            width: 100%;
            max-width: 500px; /* Card size slightly increased */
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-weight: 800;
            font-size: 28px;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #64748b;
            font-size: 14px;
            margin-top: 4px;
        }

        /* QR SECTION - EXTRA LARGE */
        .qr-section {
            background: #fff;
            border: 3px solid var(--primary);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .qr-section img {
            width: 320px; /* QR SIZE INCREASED */
            height: 320px;
            object-fit: contain;
            border-radius: 10px;
        }

        .qr-badge {
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 5px 15px;
            border-radius: 50px;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: #334155;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
            background: #f8fafc;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.05);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #fff;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #222;
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .status-msg {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
            min-height: 20px;
        }

        .instructions {
            margin-top: 30px;
            padding: 20px;
            background: #fafafa;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
        }

        .instruction-item {
            font-size: 13px;
            color: #475569;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            line-height: 1.5;
        }

        .instruction-item b {
            color: var(--primary);
            margin-right: 8px;
        }

        .support-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 800;
            border-bottom: 2px solid var(--primary);
        }

        @media (max-width: 450px) {
            .qr-section img {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="header">
        <h1>WASI OTP</h1>
        <p>Deposit Funds Manually</p>
    </div>

    <!-- QR CODE SECTION -->
    <div class="qr-section">
        <img src="qr.png" alt="Payment QR Code">
        <div class="qr-badge">Scan QR to Pay</div>
    </div>

    <div class="input-group">
        <label>Amount to Add (Min 100)</label>
        <input type="number" id="pay_amount" placeholder="e.g. 500" min="100">
    </div>

    <div class="input-group">
        <label>Transaction ID / Hash</label>
        <input type="text" id="pay_trx" placeholder="Enter TRX ID from receipt">
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitToSupabase()">Submit Payment Request</button>
    
    <div id="statusMsg" class="status-msg"></div>

    <!-- INSTRUCTIONS SECTION -->
    <div class="instructions">
        <div class="instruction-item"><b>•</b> Minimum payment is 100</div>
        <div class="instruction-item"><b>•</b> Scan the qr code and send money</div>
        <div class="instruction-item"><b>•</b> Without scanning payment sending is possible through account number</div>
        <div class="instruction-item"><b>•</b> After sending Payment send a message to our support: <a href="https://wa.me/994401879953" class="support-link">+994401879953</a></div>
        <div class="instruction-item"><b>•</b> We will check and add your payment instantly</div>
    </div>
</div>

<script>
    // Supabase Credentials
    const SUPABASE_URL = "https://aljcxnobmmtcfpvdacbo.supabase.co";
    const SUPABASE_KEY = "sb_publishable_xVWCkX7Gl2m0cFUKlSn3pg_liSvnzmg";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function submitToSupabase() {
        const amount = document.getElementById('pay_amount').value;
        const trx = document.getElementById('pay_trx').value;
        const msg = document.getElementById('statusMsg');
        const btn = document.getElementById('submitBtn');

        // Validation
        if (!amount || amount < 100) {
            showMsg("❌ Minimum payment is 100", "red");
            return;
        }
        if (!trx || trx.length < 5) {
            showMsg("❌ Please enter a valid Transaction ID", "red");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            // Get Logged-in User
            const { data: { user }, error: authError } = await _supabase.auth.getUser();
            
            if (authError || !user) {
                showMsg("❌ Please login to your account first!", "red");
                btn.disabled = false;
                btn.innerText = "Submit Payment Request";
                return;
            }

            // Insert into payment_requests table
            const { error: insertError } = await _supabase
                .from('payment_requests')
                .insert([
                    { 
                        user_id: user.id, 
                        amount: parseFloat(amount), 
                        transaction_id: trx,
                        status: 'pending' 
                    }
                ]);

            if (insertError) throw insertError;

            showMsg("✅ Request Sent! Wait for admin approval.", "green");
            document.getElementById('pay_amount').value = "";
            document.getElementById('pay_trx').value = "";

        } catch (err) {
            console.error(err);
            showMsg("❌ Error: " + err.message, "red");
        } finally {
            btn.disabled = false;
            btn.innerText = "Submit Payment Request";
        }
    }

    function showMsg(text, color) {
        const msg = document.getElementById('statusMsg');
        msg.innerText = text;
        msg.style.color = color;
    }
</script>

</body>
</html>
