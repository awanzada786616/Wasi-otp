<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasi OTP | Rent Number</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dropdown-menu { display: none; }
        .dropdown-menu.show { display: block; }
        .toast-active { transform: translate(-50%, 0); opacity: 1; }
        .toast-hidden { transform: translate(-50%, -20px); opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <!-- Toast -->
    <div id="toast" class="fixed top-5 left-1/2 z-[100] transition-all duration-300 toast-hidden w-[90%] max-w-md">
        <div id="toast-bg" class="bg-emerald-500 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 font-bold text-sm">
            <i data-lucide="info"></i> <span id="toast-msg">Success!</span>
        </div>
    </div>

    <nav class="bg-white border-b sticky top-0 z-50 px-6 py-4">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white"><i data-lucide="hash"></i></div>
                <h1 class="text-xl font-black italic">WASI<span class="text-indigo-600">RENT</span></h1>
            </div>
            <div id="user-balance" class="bg-indigo-50 px-4 py-2 rounded-2xl text-indigo-700 font-black text-sm italic border border-indigo-100">Rs 0.00 PKR</div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-8 space-y-6">
        
        <div class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
            <h2 class="text-xl font-extrabold text-slate-800 mb-8 tracking-tight italic">Rent Number [ Wasi OTP ]</h2>
            
            <div class="space-y-5">
                <!-- Country Select -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Select Country</label>
                    <select id="country-select" onchange="loadPricing()" class="w-full p-4 bg-white border border-slate-200 rounded-2xl text-sm font-bold outline-none focus:ring-2 ring-indigo-500 appearance-none">
                        <option value="">Loading Countries...</option>
                    </select>
                </div>

                <!-- Service Searchable Dropdown -->
                <div class="space-y-2 relative">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Select Service</label>
                    <div onclick="toggleDropdown()" class="w-full p-4 bg-white border border-slate-200 rounded-2xl text-sm font-bold flex justify-between items-center cursor-pointer">
                        <span id="selected-service" class="text-slate-400">— Choose Service —</span>
                        <i data-lucide="chevron-down" class="w-5 h-5"></i>
                    </div>

                    <div id="dropdown-menu" class="dropdown-menu absolute top-full left-0 w-full mt-2 bg-white border border-slate-200 rounded-3xl shadow-2xl z-50 overflow-hidden">
                        <div class="p-3 bg-slate-50/50 border-b border-slate-100">
                            <input type="text" id="service-search" onkeyup="filterServices()" placeholder="Search service..." class="w-full p-3 rounded-xl border border-slate-200 text-sm font-bold outline-none focus:ring-2 ring-indigo-500">
                        </div>
                        <div id="service-options" class="max-h-60 overflow-y-auto custom-scroll p-2 space-y-1 text-sm font-bold text-slate-600">
                            <!-- Services load here -->
                        </div>
                    </div>
                </div>

                <button id="rent-btn" onclick="handleRent()" class="w-full bg-[#0a0a23] text-white py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="key"></i> Rent Number
                </button>
            </div>
        </div>

        <!-- Active Rentals -->
        <div id="active-rentals" class="space-y-4"></div>

    </main>

    <script>
        const SUPABASE_URL = "https://aljcxnobmmtcfpvdacbo.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsamN4bm9ibW10Y2ZwdmRhY2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwNDk4NzcsImV4cCI6MjA4NDYyNTg3N30.NHDGMPhxxnUcjZxBLvUxFzoe6Yvp7N86ZJyiUK8LgRo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let USER_ID = null, ALL_PRICES = [], SELECTED_PRICING = null;

        async function init() {
            lucide.createIcons();
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) { USER_ID = user.id; fetchBalance(); }
            loadCountries();
            renderRentals();
        }

        async function fetchBalance() {
            const { data } = await _supabase.from('profiles').select('balance').eq('id', USER_ID).single();
            if (data) document.getElementById('user-balance').innerText = `Rs ${parseFloat(data.balance).toFixed(2)} PKR`;
        }

        async function loadCountries() {
            const res = await fetch(`/api/rent?action=getRentalCountries`);
            const json = await res.json();
            if (json.status == "success") {
                document.getElementById('country-select').innerHTML = json.data.map(c => `<option value="${c.code}">${c.name}</option>`).join('');
                loadPricing();
            }
        }

        async function loadPricing() {
            const code = document.getElementById('country-select').value;
            const res = await fetch(`/api/rent?action=getRentalPricing&country_code=${code}`);
            const json = await res.json();
            if (json.status == "success") {
                ALL_PRICES = json.data;
                renderOptions(ALL_PRICES);
            }
        }

        function renderOptions(data) {
            document.getElementById('service-options').innerHTML = data.map(s => `
                <div onclick="selectService('${s.id}', '${s.service}', ${s.user_price})" class="p-3 hover:bg-indigo-50 rounded-xl cursor-pointer flex justify-between items-center transition-all">
                    <span>${s.service}</span>
                    <span class="text-indigo-600 bg-white px-2 py-1 rounded-lg border text-xs font-black tracking-tight">Rs ${s.user_price}</span>
                </div>`).join('');
        }

        function toggleDropdown() { document.getElementById('dropdown-menu').classList.toggle('show'); }

        function selectService(id, name, price) {
            SELECTED_PRICING = { id, name, price };
            document.getElementById('selected-service').innerText = `${name} — Rs ${price} PKR`;
            document.getElementById('selected-service').classList.replace('text-slate-400', 'text-slate-900');
            toggleDropdown();
        }

        function filterServices() {
            const term = document.getElementById('service-search').value.toLowerCase();
            renderOptions(ALL_PRICES.filter(s => s.service.toLowerCase().includes(term)));
        }

        function showToast(msg, color = "bg-emerald-500") {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.querySelector('div').className = `${color} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 font-bold text-sm`;
            toast.classList.replace('toast-hidden', 'toast-active');
            setTimeout(() => toast.classList.replace('toast-active', 'toast-hidden'), 3500);
        }

        async function handleRent() {
            if (!SELECTED_PRICING) return showToast("Select a service!", "bg-red-500");
            const btn = document.getElementById('rent-btn');
            btn.disabled = true; btn.innerText = "Renting...";

            const res = await fetch(`/api/rent?action=rentNumber&pricing_id=${SELECTED_PRICING.id}&user_id=${USER_ID}&cost=${SELECTED_PRICING.price}`);
            const json = await res.json();

            if (json.status == "success") {
                saveRental({ id: json.data.order_id, number: json.data.number, service: SELECTED_PRICING.name, cost: SELECTED_PRICING.price });
                fetchBalance(); renderRentals();
                showToast("Number rented successfully!");
            } else {
                showToast(json.msg || "Rent failed", "bg-red-500");
            }
            btn.disabled = false; btn.innerHTML = `<i data-lucide="key"></i> Rent Number`;
            lucide.createIcons();
        }

        function saveRental(obj) {
            let list = JSON.parse(localStorage.getItem('wasi_rentals') || '[]');
            list.unshift(obj);
            localStorage.setItem('wasi_rentals', JSON.stringify(list));
        }

        function renderRentals() {
            const list = JSON.parse(localStorage.getItem('wasi_rentals') || '[]');
            document.getElementById('active-rentals').innerHTML = list.map(r => `
                <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm flex flex-col gap-4">
                    <div class="flex items-center gap-4">
                        <div class="bg-indigo-600 p-3 rounded-full text-white"><i data-lucide="phone"></i></div>
                        <div>
                            <p class="text-indigo-600 font-black text-sm">+${r.number}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${r.service} — Rs ${r.cost} PKR</p>
                        </div>
                    </div>
                    <div id="sms-area-${r.id}" class="bg-slate-50 rounded-2xl p-4 border-2 border-dashed text-xs text-slate-400 text-center font-bold">
                        Click refresh to check SMS
                    </div>
                    <div class="flex gap-2">
                        <button onclick="checkSMS('${r.id}')" class="flex-1 bg-amber-50 text-amber-600 py-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2">
                            <i data-lucide="refresh-cw" class="w-3 h-3"></i> Check SMS
                        </button>
                        <button onclick="removeRental('${r.id}')" class="p-3 text-slate-300 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        async function checkSMS(id) {
            const res = await fetch(`/api/rent?action=getRentalSMS&order_id=${id}`);
            const json = await res.json();
            const area = document.getElementById(`sms-area-${id}`);
            if (json.status == "success" && json.data.length > 0) {
                area.innerHTML = json.data.map(m => `<div class="bg-white p-2 rounded-lg border mb-1 text-slate-800 text-left"><span class="text-indigo-600 font-black">${m.code}</span> - ${m.text}</div>`).join('');
                area.className = "bg-green-50 rounded-2xl p-4 border-2 border-dashed text-xs font-bold";
            } else {
                showToast("No SMS yet.", "bg-amber-500");
            }
        }

        function removeRental(id) {
            let list = JSON.parse(localStorage.getItem('wasi_rentals') || '[]');
            localStorage.setItem('wasi_rentals', JSON.stringify(list.filter(x => x.id != id)));
            renderRentals();
        }

        window.onclick = function(e) { if (!e.target.closest('.relative')) document.getElementById('dropdown-menu').classList.remove('show'); }
        window.onload = init;
    </script>
</body>
                  </html>
