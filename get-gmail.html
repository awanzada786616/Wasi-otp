<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasi Email Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .toast-active { transform: translateY(0); opacity: 1; }
        .toast-hidden { transform: translateY(-20px); opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <!-- Stylish Toast Notification -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] transition-all duration-300 toast-hidden">
        <div class="bg-emerald-500 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
            <i data-lucide="check-circle" class="w-5 h-5"></i>
            <span id="toast-msg" class="text-sm font-bold">Email purchased! Waiting for OTP...</span>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50 px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl"><i data-lucide="mail" class="text-white w-5 h-5"></i></div>
                <h1 class="text-xl font-extrabold text-slate-900 tracking-tight italic">WASI<span class="text-indigo-600">EMAIL</span></h1>
            </div>
            <div id="user-balance" class="bg-indigo-50 px-4 py-2 rounded-2xl text-indigo-700 font-black text-sm border border-indigo-100 italic">Rs 0.00</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8 space-y-6">
        
        <!-- Buy Section -->
        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
            <h2 class="text-lg font-bold text-slate-800 mb-6 tracking-tight">Buy Email [ OtpGet ]</h2>
            
            <div class="space-y-4">
                <select id="domain-select" onchange="loadServices()" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold text-slate-600 outline-none">
                    <option value="gmail.com">Gmail (gmail.com)</option>
                    <option value="outlook.com">Outlook (outlook.com)</option>
                </select>

                <div class="relative">
                    <select id="service-dropdown" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold text-slate-600 outline-none appearance-none cursor-pointer">
                        <option value="">— Select Service —</option>
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5 pointer-events-none"></i>
                </div>

                <button onclick="handleBuy()" id="buy-btn" class="w-full bg-[#0a0a23] text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 hover:opacity-90 transition-all">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i> Buy Email
                </button>
            </div>
        </div>

        <!-- Active Orders Section -->
        <div id="active-list" class="space-y-4">
            <!-- Persistent Orders -->
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://aljcxnobmmtcfpvdacbo.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsamN4bm9ibW10Y2ZwdmRhY2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwNDk4NzcsImV4cCI6MjA4NDYyNTg3N30.NHDGMPhxxnUcjZxBLvUxFzoe6Yvp7N86ZJyiUK8LgRo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let USER_ID = null;
        let ALL_SERVICES = [];

        async function init() {
            lucide.createIcons();
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) { USER_ID = user.id; fetchBalance(); }
            loadServices();
            renderActiveOrders();
        }

        async function fetchBalance() {
            const { data } = await _supabase.from('profiles').select('balance').eq('id', USER_ID).single();
            if (data) document.getElementById('user-balance').innerText = `Rs ${parseFloat(data.balance).toFixed(2)} PKR`;
        }

        async function loadServices() {
            const domain = document.getElementById('domain-select').value;
            const res = await fetch(`/api/email?action=getEmailServices&domain=${domain}`);
            const json = await res.json();
            if (json.status == "200") {
                ALL_SERVICES = json.services;
                const dropdown = document.getElementById('service-dropdown');
                dropdown.innerHTML = '<option value="">— Select Service —</option>' + 
                    ALL_SERVICES.map(s => {
                        const price = Math.ceil(s.price * 1.4);
                        return `<option value="${s.service_code}" data-price="${price}" data-name="${s.service_name}">${s.service_name} — Rs ${price} PKR (${s.count} available)</option>`;
                    }).join('');
            }
        }

        function showToast(msg, color = 'bg-emerald-500') {
            const toast = document.getElementById('toast');
            const toastBg = toast.querySelector('div');
            document.getElementById('toast-msg').innerText = msg;
            toastBg.className = `${color} text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3`;
            toast.classList.replace('toast-hidden', 'toast-active');
            setTimeout(() => toast.classList.replace('toast-active', 'toast-hidden'), 4000);
        }

        async function handleBuy() {
            const drop = document.getElementById('service-dropdown');
            const selected = drop.options[drop.selectedIndex];
            if (!selected.value) return showToast("Please select a service", "bg-red-500");

            const cost = selected.dataset.price;
            const name = selected.dataset.name;
            const domain = document.getElementById('domain-select').value;

            document.getElementById('buy-btn').disabled = true;
            document.getElementById('buy-btn').innerHTML = "Processing...";

            const res = await fetch(`/api/email?action=buyEmail&service_id=${selected.value}&domain=${domain}&user_id=${USER_ID}&cost=${cost}`);
            const json = await res.json();

            if (json.status == "200" || json.status == "success") {
                const session = { id: json.email_id || json.data.email_id, email: json.email || json.data.email, service: name, cost: cost, code: null };
                saveOrder(session);
                showToast("Email purchased! Waiting for OTP...");
                fetchBalance();
                renderActiveOrders();
            } else {
                showToast(json.msg || "Transaction Failed", "bg-red-500");
            }
            document.getElementById('buy-btn').disabled = false;
            document.getElementById('buy-btn').innerHTML = '<i data-lucide="shopping-cart" class="w-5 h-5"></i> Buy Email';
            lucide.createIcons();
        }

        function renderActiveOrders() {
            const list = document.getElementById('active-list');
            const orders = JSON.parse(localStorage.getItem('wasi_active_emails') || '[]');
            list.innerHTML = orders.map(o => `
                <div class="bg-white p-6 rounded-[2rem] border shadow-sm flex flex-col gap-4">
                    <div class="flex items-center gap-4">
                        <div class="bg-indigo-600 p-3 rounded-full text-white"><i data-lucide="mail" class="w-6 h-6"></i></div>
                        <div class="flex-1">
                            <p class="text-indigo-600 font-bold text-sm mb-1 select-all flex items-center gap-2">
                                ${o.email} <i data-lucide="copy" class="w-3 h-3 cursor-pointer" onclick="navigator.clipboard.writeText('${o.email}')"></i>
                            </p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest flex items-center gap-4">
                                <span><i data-lucide="tag" class="w-3 h-3 inline"></i> ${o.service}</span>
                                <span><i data-lucide="globe" class="w-3 h-3 inline"></i> @${o.email.split('@')[1]}</span>
                                <span><i data-lucide="banknote" class="w-3 h-3 inline"></i> Rs ${o.cost} PKR</span>
                            </p>
                        </div>
                    </div>
                    <div class="bg-slate-50 rounded-2xl p-6 border border-dashed border-slate-200">
                        <div id="otp-area-${o.id}" class="text-sm text-slate-400 font-medium">
                            ${o.code ? `<span class="text-2xl font-black text-slate-800 tracking-[5px]">${o.code}</span>` : 'Searching for otp...'}
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="checkOTP('${o.id}')" class="flex-1 bg-amber-50 text-amber-600 py-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2">
                            <i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Waiting for code...
                        </button>
                        ${!o.code ? `<button onclick="cancelEmail('${o.id}', ${o.cost})" class="flex-1 bg-red-50 text-red-500 py-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2">
                            <i data-lucide="trash-2" class="w-4 h-4"></i> Cancel
                        </button>` : ''}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function checkOTP(id) {
            const res = await fetch(`/api/email?action=getEmailCode&email_id=${id}`);
            const json = await res.json();
            if (json.status == "200" && json.data?.code) {
                let orders = JSON.parse(localStorage.getItem('wasi_active_emails'));
                const i = orders.findIndex(x => x.id == id);
                orders[i].code = json.data.code;
                localStorage.setItem('wasi_active_emails', JSON.stringify(orders));
                showToast("OTP Received Successfully!");
                renderActiveOrders();
            } else {
                showToast("Still waiting for code...", "bg-amber-500");
            }
        }

        async function cancelEmail(id, cost) {
            if(!confirm("Cancel and refund?")) return;
            const res = await fetch(`/api/email?action=cancelEmail&email_id=${id}&cost=${cost}&user_id=${USER_ID}`);
            const json = await res.json();
            if(json.status == "success") {
                let orders = JSON.parse(localStorage.getItem('wasi_active_emails'));
                localStorage.setItem('wasi_active_emails', JSON.stringify(orders.filter(x => x.id != id)));
                showToast("Order Cancelled & Refunded!", "bg-slate-800");
                fetchBalance();
                renderActiveOrders();
            } else {
                showToast("Cannot cancel. OTP might be delivered.", "bg-red-500");
            }
        }

        function saveOrder(obj) {
            let orders = JSON.parse(localStorage.getItem('wasi_active_emails') || '[]');
            orders.unshift(obj);
            localStorage.setItem('wasi_active_emails', JSON.stringify(orders));
        }

        window.onload = init;
    </script>
</body>
</html>
