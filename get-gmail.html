<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasi Email Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .service-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .service-card:hover { transform: translateY(-4px); border-color: #4f46e5; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-2xl">
                    <i data-lucide="mail" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-extrabold text-slate-900 tracking-tight italic">WASI<span class="text-indigo-600">EMAIL</span></h1>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Wallet</p>
                <p id="user-balance" class="text-lg font-black text-indigo-700 leading-none mt-1">$0.00</p>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-8 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
                    <h2 class="font-bold text-slate-800 uppercase text-xs tracking-widest">Available Services</h2>
                    <select id="domain-select" onchange="loadServices()" class="w-full md:w-44 p-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-600 outline-none ring-1 ring-slate-100 focus:ring-2 ring-indigo-500">
                        <option value="gmail.com">Gmail.com</option>
                        <option value="outlook.com">Outlook.com</option>
                    </select>
                </div>

                <!-- Services Grid -->
                <div id="services-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
                    <!-- Shimmer Loaders -->
                    <div class="animate-pulse bg-white h-32 rounded-3xl"></div>
                    <div class="animate-pulse bg-white h-32 rounded-3xl"></div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border-t-4 border-indigo-600 sticky top-28">
                    <h2 class="font-bold text-slate-800 uppercase text-[10px] tracking-widest mb-6 flex items-center gap-2">
                        <i data-lucide="zap" class="w-4 h-4 text-indigo-500"></i> Active Session
                    </h2>
                    <div id="active-list" class="space-y-4">
                        <p class="text-center text-slate-300 text-xs py-10 font-medium italic">Inbox is empty.</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://aljcxnobmmtcfpvdacbo.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsamN4bm9ibW10Y2ZwdmRhY2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwNDk4NzcsImV4cCI6MjA4NDYyNTg3N30.NHDGMPhxxnUcjZxBLvUxFzoe6Yvp7N86ZJyiUK8LgRo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let USER_ID = null;

        async function init() {
            lucide.createIcons();
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                USER_ID = user.id;
                fetchBalance();
            } else {
                document.getElementById('user-balance').innerText = "Login Req.";
            }
            loadServices();
        }

        async function fetchBalance() {
            const { data } = await _supabase.from('profiles').select('balance').eq('id', USER_ID).single();
            if (data) document.getElementById('user-balance').innerText = `$${parseFloat(data.balance).toFixed(2)}`;
        }

        async function loadServices() {
            const domain = document.getElementById('domain-select').value;
            const grid = document.getElementById('services-grid');
            
            try {
                const res = await fetch(`/api/email?action=getEmailServices&domain=${domain}`);
                const json = await res.json();
                
                // FIXED: Checking for "200" and using "services" array
                if (json.status == "200" && json.services) {
                    grid.innerHTML = json.services.map(s => {
                        // Profit calculation (40%)
                        const userPrice = Math.ceil(parseFloat(s.price) * 1.4);
                        
                        return `
                        <div class="service-card bg-white p-5 rounded-3xl shadow-sm flex flex-col justify-between">
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-tighter">${s.service_name}</span>
                                <span class="text-lg font-black text-slate-900">$${userPrice}</span>
                            </div>
                            <button onclick="buyEmail('${s.service_code}', ${userPrice})" class="w-full bg-slate-900 text-white py-3 rounded-2xl text-[10px] font-bold hover:bg-indigo-600 transition-all shadow-md active:scale-95">
                                BUY NOW
                            </button>
                        </div>
                        `;
                    }).join('');
                    lucide.createIcons();
                } else {
                    grid.innerHTML = `<div class="col-span-full text-center py-10 text-red-400 font-bold">API Error: ${json.status}</div>`;
                }
            } catch (e) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400 italic">Failed to load services. Check backend.</div>`;
            }
        }

        async function buyEmail(code, cost) {
            if (!USER_ID) return alert("Please Login!");
            if (!confirm(`Buy for $${cost}?`)) return;

            const domain = document.getElementById('domain-select').value;
            const res = await fetch(`/api/email?action=buyEmail&service_id=${code}&domain=${domain}&user_id=${USER_ID}&cost=${cost}`);
            const json = await res.json();

            if (json.status == "200" || json.status == "success") {
                fetchBalance();
                addActiveEmail(json.data || json);
            } else {
                alert(json.msg || "Transaction Failed");
            }
        }

        function addActiveEmail(data) {
            const list = document.getElementById('active-list');
            if (list.innerText.includes('empty')) list.innerHTML = '';
            
            // Note: Adjusting for potential difference in buy API response keys
            const email = data.email || data.data?.email;
            const id = data.email_id || data.data?.email_id;

            const div = document.createElement('div');
            div.className = "bg-indigo-50 border border-indigo-100 p-4 rounded-3xl mb-4";
            div.innerHTML = `
                <p class="text-xs font-black text-slate-800 break-all mb-4">${email}</p>
                <div id="otp-${id}" class="bg-white p-3 rounded-2xl text-center text-xs font-bold text-indigo-600 animate-pulse border border-indigo-100">
                    WAITING FOR OTP...
                </div>
                <button onclick="checkOTP('${id}')" class="w-full mt-3 py-2.5 bg-indigo-600 text-white rounded-xl text-[10px] font-bold flex items-center justify-center gap-2 hover:bg-indigo-700">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i> REFRESH OTP
                </button>
            `;
            list.prepend(div);
            lucide.createIcons();
        }

        async function checkOTP(id) {
            const box = document.getElementById(`otp-${id}`);
            box.innerText = "CHECKING...";
            const res = await fetch(`/api/email?action=getEmailCode&email_id=${id}`);
            const json = await res.json();

            if (json.status == "200" && json.data?.code) {
                box.innerHTML = `<span class="text-slate-400 mr-2 uppercase">Code:</span> ${json.data.code}`;
                box.className = "bg-green-50 border border-green-200 p-3 rounded-2xl text-center text-sm font-black text-green-700 shadow-sm";
            } else {
                box.innerText = "NO CODE FOUND YET.";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
