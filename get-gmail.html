<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasi Email Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-[#f3f4f6] min-h-screen text-slate-900">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 border-b border-white px-6 py-4 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-xl text-white">
                    <i data-lucide="mail"></i>
                </div>
                <h1 class="text-xl font-black italic">WASI<span class="text-indigo-600">EMAIL</span></h1>
            </div>
            <div class="bg-indigo-50 border border-indigo-100 px-4 py-1.5 rounded-2xl flex flex-col items-end">
                <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Balance</span>
                <p id="user-balance" class="text-lg font-black text-indigo-700 leading-none">$0.00</p>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Store Section -->
        <div class="lg:col-span-8 space-y-6">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em]">Purchase Email</h2>
                    <select id="domain-select" onchange="loadServices()" class="bg-slate-50 border-none rounded-xl px-4 py-2 text-xs font-bold outline-none ring-1 ring-slate-200">
                        <option value="gmail.com">Gmail.com</option>
                        <option value="outlook.com">Outlook.com</option>
                    </select>
                </div>
                
                <div id="services-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Dynamic Services -->
                    <div class="col-span-full text-center py-10 text-slate-400 animate-pulse font-medium">Fetching available services...</div>
                </div>
            </div>
        </div>

        <!-- Sidebar: Active Emails -->
        <div class="lg:col-span-4">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 sticky top-28">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                    <i data-lucide="inbox" class="w-4 h-4"></i> Active Sessions
                </h2>
                <div id="active-list" class="space-y-4">
                    <p class="text-center text-slate-300 text-xs py-10 font-medium italic">No emails purchased yet.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = "https://aljcxnobmmtcfpvdacbo.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsamN4bm9ibW10Y2ZwdmRhY2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwNDk4NzcsImV4cCI6MjA4NDYyNTg3N30.NHDGMPhxxnUcjZxBLvUxFzoe6Yvp7N86ZJyiUK8LgRo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let USER_ID = null;

        async function init() {
            lucide.createIcons();
            
            // Get user from Supabase
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                USER_ID = user.id;
                fetchBalance();
            } else {
                document.getElementById('user-balance').innerText = "Not Logged In";
            }
            loadServices();
        }

        async function fetchBalance() {
            const { data } = await _supabase.from('profiles').select('balance').eq('id', USER_ID).single();
            if (data) document.getElementById('user-balance').innerText = `$${parseFloat(data.balance).toFixed(2)}`;
        }

        async function loadServices() {
            const domain = document.getElementById('domain-select').value;
            const grid = document.getElementById('services-grid');
            
            try {
                // IMPORTANT: Use your actual Vercel URL if running locally
                const res = await fetch(`/api/email?action=getEmailServices&domain=${domain}`);
                const json = await res.json();
                
                if (json.status === 'success') {
                    grid.innerHTML = json.data.map(s => `
                        <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100 hover:border-indigo-400 hover:bg-white transition-all group">
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-lg text-[10px] font-black uppercase tracking-tighter">${s.name}</span>
                                <span class="text-xl font-black text-slate-900">$${s.user_price}</span>
                            </div>
                            <button onclick="buyEmail('${s.id}', ${s.user_price})" class="w-full bg-slate-900 text-white py-3 rounded-2xl text-[10px] font-bold hover:bg-indigo-600 shadow-xl shadow-slate-200 transition-colors">
                                PURCHASE EMAIL
                            </button>
                        </div>
                    `).join('');
                    lucide.createIcons();
                } else {
                    grid.innerHTML = `<p class="col-span-full text-center text-red-500 py-10">${json.msg || 'API Error'}</p>`;
                }
            } catch (e) {
                grid.innerHTML = `<p class="col-span-full text-center text-slate-400 py-10 italic">Backend connection failed. Deploy /api/email.js to Vercel first.</p>`;
            }
        }

        async function buyEmail(id, cost) {
            if (!USER_ID) return alert("Please Login First!");
            if (!confirm(`Buy email for $${cost}?`)) return;

            const domain = document.getElementById('domain-select').value;
            const res = await fetch(`/api/email?action=buyEmail&service_id=${id}&domain=${domain}&user_id=${USER_ID}&cost=${cost}`);
            const json = await res.json();

            if (json.status === 'success') {
                fetchBalance();
                addActiveEmail(json.data);
            } else {
                alert(json.msg || "Transaction Failed");
            }
        }

        function addActiveEmail(data) {
            const list = document.getElementById('active-list');
            if (list.innerText.includes('No emails')) list.innerHTML = '';

            const div = document.createElement('div');
            div.className = "bg-indigo-50 border border-indigo-100 p-4 rounded-3xl mb-4";
            div.innerHTML = `
                <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1">Temporary Email</p>
                <p class="text-xs font-black text-slate-800 break-all mb-4 select-all cursor-pointer">${data.email}</p>
                <div id="otp-${data.email_id}" class="bg-white p-3 rounded-2xl text-center text-xs font-bold text-indigo-600 border border-indigo-100 mb-3 animate-pulse">
                    WAITING FOR OTP...
                </div>
                <button onclick="checkOTP('${data.email_id}')" class="w-full py-2.5 bg-indigo-600 text-white rounded-xl text-[10px] font-extrabold flex items-center justify-center gap-2 hover:bg-indigo-700 transition-colors">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i> REFRESH OTP
                </button>
            `;
            list.prepend(div);
            lucide.createIcons();
        }

        async function checkOTP(emailId) {
            const box = document.getElementById(`otp-${emailId}`);
            box.innerText = "CHECKING...";
            
            const res = await fetch(`/api/email?action=getEmailCode&email_id=${emailId}`);
            const json = await res.json();

            if (json.status === 'success' && json.data.code) {
                box.innerHTML = `<span class="text-slate-400 mr-2 uppercase">CODE:</span> ${json.data.code}`;
                box.classList.remove('animate-pulse');
                box.className = "bg-green-50 border border-green-200 p-3 rounded-2xl text-center text-sm font-black text-green-700 shadow-sm";
            } else {
                box.innerText = "NO CODE YET. TRY AGAIN.";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
